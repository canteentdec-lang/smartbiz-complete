{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Business Control Panel</title>
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}" />
  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
  TOAST CONTAINER
══════════════════════════════════════════════════════ -->
<div id="toastContainer" class="toast-container"></div>

<!-- ══════════════════════════════════════════════════════
  SIDEBAR OVERLAY (mobile)
══════════════════════════════════════════════════════ -->
<div class="sidebar-overlay"></div>

<div class="app-shell">

  <!-- ════════════════════════════════════════════════════
    SIDEBAR
  ════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">💼</div>
        <div class="logo-text">
          <div class="logo-name">SmartBiz</div>
          <div class="logo-tagline">Control Panel</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main Menu</div>

      <a class="nav-item active" data-page="dashboard" href="/dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-page="sales" href="/sales">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Sales</span>
        <span class="nav-badge">10</span>
      </a>
      <a class="nav-item" data-page="products">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Products</span>
      </a>
      <a class="nav-item" data-page="analytics">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Analytics</span>
      </a>

      <div class="nav-section-label">People & Growth</div>

      <a class="nav-item" data-page="employees">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Employees</span>
      </a>
      <a class="nav-item" data-page="marketing">
        <span class="nav-icon">📣</span>
        <span class="nav-label">Marketing</span>
        <span class="nav-badge">3</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar-sm">RK</div>
        <div class="user-info-sm">
          <div class="user-name-sm">Raj Kumar</div>
          <div class="user-role-sm">Business Owner</div>
        </div>
        <span style="color:rgba(255,255,255,0.3);font-size:14px">⚙️</span>
      </div>
    </div>
  </aside>

  <!-- ════════════════════════════════════════════════════
    MAIN CONTENT
  ════════════════════════════════════════════════════ -->
  <div class="main-content">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div>
          <div class="page-title" id="pageTitle">Dashboard</div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="globalSearch" type="text" placeholder="Search products, sales, employees…" />
        </div>
      </div>
      <div class="topbar-right">
        <div class="date-badge" id="currentDate">Loading…</div>
        <button class="icon-btn" onclick="showToast('No new notifications','info')">
          🔔
          <span class="notif-dot"></span>
        </button>
        <button class="icon-btn" onclick="showToast('Settings coming soon','info')">⚙️</button>
        <button class="profile-btn">
          <div class="profile-avatar">RK</div>
          <span class="profile-name">Raj Kumar</span>
          <span class="profile-chevron">▾</span>
        </button>
      </div>
    </header>
